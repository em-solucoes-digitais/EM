<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time FC — Demo</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <nav class="navbar"><div class="container nav-container"><a href="/index.html" class="logo"><span class="logo-em">EM</span> <span class="logo-text">Soluções Digitais</span></a></div></nav>
  <header class="hero" style="padding:120px 0 40px;">
    <div class="container hero-container">
      <div class="hero-content">
        <h1>Time FC</h1>
        <p>Demo de site para clube com notícias, tabela e calendário de jogos.</p>
        <a href="/" class="btn btn-outline">Voltar ao site</a>
      </div>
      <div class="hero-visual">
        <div class="hero-card glass">
          <div class="hero-card-header"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
          <div style="padding:8px 0">
            <h3>Próximo jogo</h3>
            <p style="color:var(--text-muted)">Time FC vs Rivals — Domingo, 16:00</p>
          </div>
        </div>
      </div>
    </div>
  </header>
  <main class="container" style="padding:40px 24px">
    <section class="section-header"><h2>Preview do site</h2></section>
    <div class="demo-screenshot" style="position:relative;margin-top:20px">
      <svg viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Preview Futebol">
        <rect x="40" y="40" width="1120" height="640" rx="10" fill="#06121a" />
        <rect x="80" y="120" width="400" height="360" rx="8" fill="#071826" />
        <rect x="500" y="120" width="560" height="60" rx="6" fill="#071826" />
        <text x="110" y="300" fill="#d7f2ff" font-size="36" font-family="Inter, Arial" font-weight="700">Time FC — Demo</text>
      </svg>
      <div class="label">Futebol — Preview</div>
    </div>
  </main>
  <footer class="footer" style="margin-top:40px;padding:24px 0"><div class="container">© Demo — Time FC</div></footer>
</body>
</html>
